<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Troop</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Audiowide&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'troop-purple': '#322275',
              'troop-light-gray': '#F5F5F5',
              'troop-dark-gray': '#333333',
              'troop-white': '#FFFFFF',
              muted: '#E5E7EB',
              'muted-foreground': '#6B7280',
            },
            fontFamily: {
              lato: ['Lato', 'sans-serif'],
              horizon: ['Audiowide', 'cursive'],
            },
            boxShadow: {
              strong:
                '0 10px 25px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.2)',
            },
          },
        },
      };
    </script>

    <!-- Google Maps (para o mapa e rotas) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCu47mjnadIRWMqFq1lPw_qEBz6Ns3Ic7s&libraries=places,geometry"></script>
  </head>
  <body class="h-screen font-lato bg-troop-light-gray text-troop-dark-gray">
    <!-- Header simples -->
    <header class="h-14 px-4 sm:px-6 flex items-center justify-between bg-troop-purple text-troop-white shadow">
      <div class="flex items-center gap-2">
        <div
          class="relative flex items-center justify-center h-10 w-10 bg-troop-white/90 rounded-2xl shadow-2xl"
        >
          <img
            src="https://img.icons8.com/?size=100&id=QTQ1x0Wu6rnn&format=png&color=000000"
            alt="Van Escolar"
            class="h-7 w-7 object-contain drop-shadow-xl"
          />
        </div>
        <span class="font-horizon text-xl tracking-wide">Troop</span>
      </div>
      <div class="flex items-center gap-3 text-xs sm:text-sm">
        <span id="user-label" class="hidden sm:inline text-troop-white/80"></span>
        <button
          id="btn-logout"
          class="px-3 py-1.5 rounded-full bg-white/10 hover:bg-white/20 text-xs font-semibold border border-white/30"
        >
          Sair
        </button>
      </div>
    </header>

    <!-- Layout Split Screen: Mapa (70%) / Sidebar (30%) -->
    <main class="h-[calc(100vh-3.5rem)] flex flex-col md:flex-row">
      <!-- Mapa -->
      <section class="md:w-7/12 lg:w-2/3 h-64 md:h-full bg-slate-200 relative">
        <div id="map" class="absolute inset-0"></div>
        <div
          id="map-empty-state"
          class="absolute inset-0 flex items-center justify-center text-center px-6 text-muted-foreground"
        >
          <div class="bg-white/90 backdrop-blur rounded-2xl px-4 py-3 shadow-md border border-muted max-w-xs">
            <p class="text-xs sm:text-sm font-medium mb-1">Carregando mapa da Troop…</p>
            <p class="text-[11px] sm:text-xs">
              Assim que encontramos rotas para a sua busca, você verá o caminho da van aqui.
            </p>
          </div>
        </div>
      </section>

      <!-- Sidebar de resultados -->
      <aside class="md:w-5/12 lg:w-1/3 h-full bg-troop-white border-t md:border-t-0 md:border-l border-muted flex flex-col">
        <!-- Resumo da busca -->
        <div class="px-4 py-3 border-b border-muted bg-troop-light-gray/70">
          <p class="text-[11px] uppercase tracking-wide text-muted-foreground mb-1 font-semibold">
            Busca ativa
          </p>
          <p id="search-summary" class="text-sm font-semibold text-troop-dark-gray"></p>
          <p id="search-hint" class="text-[11px] text-muted-foreground mt-1">
            Esses resultados são baseados nas informações que você informou na landing.
          </p>
        </div>

        <!-- Lista de motoristas -->
        <div class="flex-1 overflow-y-auto p-4 space-y-3" id="driver-list"></div>

        <!-- Estado vazio / erro -->
        <div id="driver-empty" class="p-4 text-center text-sm text-muted-foreground hidden">
          Nenhuma rota encontrada para essa busca ainda. Tente ajustar os horários ou pontos de embarque.
        </div>
      </aside>
    </main>

    <!-- Scripts principais -->
    <script type="module">
      import { checkAuth, logoutAndRedirect } from './js/router.js';
      import { apiGetRoutes } from './js/api.js';

      checkAuth();

      const userLabel = document.getElementById('user-label');
      const logoutBtn = document.getElementById('btn-logout');
      const driverList = document.getElementById('driver-list');
      const driverEmpty = document.getElementById('driver-empty');
      const searchSummary = document.getElementById('search-summary');
      const mapEmptyState = document.getElementById('map-empty-state');

      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          logoutAndRedirect();
        });
      }

      // Mostra nome do usuário, se disponível
      try {
        const name = localStorage.getItem('user_name');
        if (name && userLabel) {
          userLabel.textContent = `Olá, ${name}`;
          userLabel.classList.remove('hidden');
        }
      } catch (_) {}

      // Inicialização do mapa
      let map;
      let bounds;

      function initMap(centerLatLng) {
        if (typeof google === 'undefined' || !google.maps) return;
        map = new google.maps.Map(document.getElementById('map'), {
          center: centerLatLng || { lat: -31.7654, lng: -52.3371 }, // Pelotas/RS
          zoom: 13,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: false,
        });
        bounds = new google.maps.LatLngBounds();

        if (mapEmptyState) {
          mapEmptyState.classList.add('hidden');
        }
      }

      function addMarker(position, label) {
        if (!map || typeof google === 'undefined' || !google.maps) return;
        const marker = new google.maps.Marker({
          map,
          position,
          label,
        });
        bounds.extend(position);
        map.fitBounds(bounds);
        return marker;
      }

      async function bootstrap() {
        // Lê a busca ativa da sessionStorage
        let activeSearch = null;
        try {
          const raw = sessionStorage.getItem('active_search');
          if (raw) activeSearch = JSON.parse(raw);
        } catch (e) {
          console.warn('Erro ao ler active_search:', e);
        }

        const originText = activeSearch?.origin || activeSearch?.school || 'Origem não informada';
        const destinationText =
          activeSearch?.destination || activeSearch?.activity || 'Destino/atividade não informada';

        if (searchSummary) {
          searchSummary.textContent = `${originText} → ${destinationText}`;
        }

        // Inicializa mapa com centro padrão (Pelotas)
        initMap({ lat: -31.7654, lng: -52.3371 });

        // Se tivermos origem/destino em texto, tentamos desenhar uma rota simples
        if (activeSearch && (activeSearch.origin || activeSearch.school) && (activeSearch.destination || activeSearch.activity)) {
          try {
            const geocoder = new google.maps.Geocoder();
            const originQuery = activeSearch.origin || `${activeSearch.school}, Pelotas - RS`;
            const destQuery =
              activeSearch.destination || `${activeSearch.activity || 'Atividade'}, Pelotas - RS`;

            geocoder.geocode({ address: originQuery }, (originResults, originStatus) => {
              if (originStatus !== 'OK' || !originResults[0]) return;
              const originLoc = originResults[0].geometry.location;
              addMarker(originLoc, 'A');

              geocoder.geocode({ address: destQuery }, (destResults, destStatus) => {
                if (destStatus !== 'OK' || !destResults[0]) return;
                const destLoc = destResults[0].geometry.location;
                addMarker(destLoc, 'B');

                const line = new google.maps.Polyline({
                  path: [originLoc, destLoc],
                  geodesic: true,
                  strokeColor: '#322275',
                  strokeOpacity: 0.8,
                  strokeWeight: 4,
                });
                line.setMap(map);
              });
            });
          } catch (e) {
            console.warn('Não foi possível traçar rota no mapa:', e);
          }
        }

        // Busca rotas reais na API, se disponível
        let routes = [];
        try {
          const filters = {};
          if (activeSearch?.origin) filters.origin = activeSearch.origin;
          if (activeSearch?.destination) filters.destination = activeSearch.destination;
          routes = await apiGetRoutes(filters);
        } catch (e) {
          console.warn('Erro ao buscar rotas na API:', e);
        }

        if (!routes || routes.length === 0) {
          driverList.innerHTML = '';
          driverEmpty.classList.remove('hidden');
          return;
        }

        driverEmpty.classList.add('hidden');
        driverList.innerHTML = '';

        routes.forEach((route) => {
          const driverName = route.driver?.name || 'Motorista parceiro Troop';
          const price = route.estimatedPrice || 'A combinar';
          const capacity = route.seatCapacity || 8;
          const departure = route.departureAt
            ? new Date(route.departureAt).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
            : 'Horário a confirmar';

          const card = document.createElement('article');
          card.className =
            'rounded-2xl border border-muted bg-troop-white shadow-sm p-3 flex flex-col gap-2 text-sm';

          card.innerHTML = `
            <div class="flex items-center justify-between">
              <div>
                <p class="font-semibold text-troop-dark-gray">${driverName}</p>
                <p class="text-[11px] text-muted-foreground">Van compartilhada • até ${capacity} crianças</p>
              </div>
              <div class="text-right">
                <p class="text-xs text-muted-foreground">a partir de</p>
                <p class="text-base font-bold text-troop-purple">${price}</p>
              </div>
            </div>
            <div class="flex items-center justify-between text-[11px] text-muted-foreground">
              <span>Saída: ${departure}</span>
              <span>Rotas otimizadas Troop</span>
            </div>
            <button class="mt-2 w-full inline-flex items-center justify-center gap-1.5 rounded-lg bg-troop-purple text-troop-white text-xs font-semibold py-2 hover:bg-troop-purple/90">
              Contratar
            </button>
          `;

          const hireBtn = card.querySelector('button');
          hireBtn.addEventListener('click', () => {
            const payload = {
              driver_id: route.driverId || route.driver?.id || null,
              driver_name: driverName,
              price,
              route_id: route.id,
              origin: route.origin,
              destination: route.destination,
            };
            try {
              sessionStorage.setItem('selected_van', JSON.stringify(payload));
            } catch (e) {
              console.warn('Erro ao salvar selected_van:', e);
            }
            window.location.href = 'checkout.html';
          });

          driverList.appendChild(card);
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootstrap);
      } else {
        bootstrap();
      }
    </script>
  </body>
</html>
